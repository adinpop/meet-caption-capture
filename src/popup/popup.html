<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>RUBICON Captions</h1>
      <span id="status" class="status status-idle">Idle</span>
    </header>

    <section class="info">
      <div><label>Meeting:</label> <span id="meeting-id">—</span></div>
      <div><label>Captured lines:</label> <span id="line-count">0</span></div>
    </section>

    <section class="actions">
      <button id="toggle-capture" class="primary">Start capture</button>
    </section>

    <section class="actions">
      <button id="download">Download now</button>
      <button id="clear" class="danger">Clear</button>
    </section>

    <section class="actions secondary">
      <button id="history">View history</button>
    </section>

    <section class="hint">
      <p>
        Turn on captions in your meeting. In Meet use the <strong>CC</strong> button, in Teams use
        <strong>More actions</strong>, then <strong>Turn on live captions</strong>. The extension follows whatever
        language you pick.
      </p>
    </section>

    <section id="message"></section>

    <script src="popup.js"></script>
  </body>
</html>
