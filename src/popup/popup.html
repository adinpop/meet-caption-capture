<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Meet Captions</h1>
      <span id="status" class="status status-idle">Idle</span>
    </header>

    <section class="info">
      <div><label>Meeting:</label> <span id="meeting-id">—</span></div>
      <div><label>Captured lines:</label> <span id="line-count">0</span></div>
    </section>

    <section class="actions">
      <button id="download">Download now</button>
      <button id="clear" class="danger">Clear</button>
    </section>

    <section class="hint">
      <p>
        Enable Serbian captions in Meet: click the <strong>CC</strong> button, open settings, set
        <em>Caption language</em> to Serbian.
      </p>
    </section>

    <section id="message"></section>

    <script src="popup.js"></script>
  </body>
</html>
